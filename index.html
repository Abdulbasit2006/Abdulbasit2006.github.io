<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ─── SEO ──────────────────────────────────────────────────────── -->
  <title>Abdul Basit — Systems Engineer</title>
  <meta name="description" content="Systems software engineer. C++, embedded firmware, bare-metal. Oxford Brookes CS." />
  <meta name="author" content="Abdul Basit" />

  <!-- ─── Open Graph (link previews) ──────────────────────────────── -->
  <meta property="og:title"       content="Abdul Basit — Systems Engineer" />
  <meta property="og:description" content="C++, embedded firmware, bare-metal. Oxford Brookes CS." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://Abdulbasit2006.github.io" />

  <!-- ─── Fonts ────────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ─── Custom cursor ────────────────────────────────────────────── -->
  <div id="cursor" aria-hidden="true"></div>

  <!-- ─── Navigation ───────────────────────────────────────────────── -->
  <header id="site-header">
    <div class="container nav-inner">
      <a class="nav-logo" href="#hero">
        ab<span class="dim">@basit</span>
      </a>
      <nav aria-label="Primary">
        <!-- Injected by main.js -->
      </nav>
    </div>
  </header>

  <main>

    <!-- ─── Hero ─────────────────────────────────────────────────── -->
    <section id="hero" aria-label="Introduction">
      <div class="container">
        <p class="prompt-line" aria-hidden="true">
          <span class="green">~/</span><span class="amber-dim"> ❯ </span>whoami
        </p>
        <h1><!-- Injected --></h1>
        <p class="tagline"><!-- Injected --></p>
        <div class="hero-links"><!-- Injected --></div>
        <div class="hero-stats"><!-- Injected --></div>
      </div>
    </section>

    <!-- ─── About ─────────────────────────────────────────────────── -->
    <section id="about" aria-label="About">
      <div class="container">
        <div class="sec-header">
          <span class="sec-num">01</span>
          <h2>about</h2>
        </div>
        <div class="about-grid">
          <div class="about-text"><!-- Injected --></div>
          <aside class="stack-box" aria-label="Tech stack">
            <p class="stack-title">stack / tooling</p>
            <ul class="stack-list"><!-- Injected --></ul>
          </aside>
        </div>
      </div>
    </section>

    <!-- ─── Projects ──────────────────────────────────────────────── -->
    <section id="projects" aria-label="Projects">
      <div class="container">
        <div class="sec-header">
          <span class="sec-num">02</span>
          <h2>work</h2>
        </div>
        <ul class="project-list" role="list"><!-- Injected --></ul>
      </div>
    </section>

    <!-- ─── Writing ───────────────────────────────────────────────── -->
    <section id="writing" aria-label="Writing">
      <div class="container">
        <div class="sec-header">
          <span class="sec-num">03</span>
          <h2>writing</h2>
        </div>
        <ul class="blog-list" role="list"><!-- Injected --></ul>
        <div class="terminal" aria-hidden="true">
          <p><span class="green">ab@basit</span>:<span class="amber-dim">~/writing</span> $ ls -lt</p>
          <p class="dim">// posts in progress. check back.</p>
          <p><span class="green">ab@basit</span>:<span class="amber-dim">~/writing</span> $ <span class="cursor-blink">█</span></p>
        </div>
      </div>
    </section>

    <!-- ─── Contact ───────────────────────────────────────────────── -->
    <section id="contact" aria-label="Contact">
      <div class="container">
        <div class="sec-header">
          <span class="sec-num">04</span>
          <h2>contact</h2>
        </div>
        <div class="contact-grid">
          <ul class="contact-links" role="list"><!-- Injected --></ul>
          <div class="contact-note"><!-- Injected --></div>
        </div>
      </div>
    </section>

  </main>

  <!-- ─── Footer ───────────────────────────────────────────────────── -->
  <footer id="site-footer">
    <div class="container footer-inner">
      <span>Abdul Basit — built by hand, no frameworks.</span>
      <span>
        <a href="https://github.com/Abdulbasit2006" target="_blank" rel="noopener">source</a>
        &nbsp;·&nbsp; Oxford, UK &nbsp;·&nbsp; 2025
      </span>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
